# J.A.R.V.I.S. Configuration Example
# Copy to ~/.jarvis/config.yaml and customize

daemon:
  port: 3142
  data_dir: "~/.jarvis"
  db_path: "~/.jarvis/jarvis.db"
  # Public origin written into sidecar enrollment JWTs (`brain` + `jwks`).
  # For remote sidecars, set this to the externally reachable URL/host they
  # can actually reach, not localhost or a private/container-only hostname.
  # Env override: JARVIS_BRAIN_DOMAIN="https://brain.example.com"
  # brain_domain: "https://brain.example.com"

# Authentication — protects dashboard, API, and WebSocket.
# If unset, the application is open (no auth).
# Can also be set via JARVIS_AUTH_TOKEN env var.
# auth:
#   token: "your-secret-token-here"

# Anonymous usage metrics (opt-out, enabled by default).
# Sends a tiny anonymous ping at startup and every hour so the project can
# count unique installs and retention. No personal data, config, or content —
# just a hashed machine id, app version, install method, and OS.
# See docs/TELEMETRY.md for exactly what is collected.
# Disable here, or via JARVIS_TELEMETRY=0, or DO_NOT_TRACK=1.
telemetry:
  enabled: true

llm:
  # ── Providers ──
  # Each key is a NAME you'll reference in model strings ("name:model").
  # Set `kind` only when the name differs from the provider class (e.g. you
  # want two ollama instances called "ollama-local" + "ollama-remote").
  providers:
    anthropic:
      api_key: "sk-ant-..."
    openai:
      api_key: "sk-..."
    # groq:
    #   api_key: "gsk_..."
    # gemini:
    #   api_key: "..."
    # openrouter:
    #   api_key: "sk-or-..."
    # nvidia:
    #   api_key: "nvapi-..."
    ollama:
      base_url: "http://localhost:11434"
    # ollama-remote:
    #   kind: ollama
    #   base_url: "http://192.168.1.50:11434"
    # openai_compatible:
    #   base_url: "http://localhost:8080/v1"
    #   api_key: ""
    # litellm:
    #   base_url: "http://localhost:4000/v1"
    #   api_key: ""

  # ── Single-LLM mode ──
  # One model used for everything. The system runs in classic
  # single-orchestrator mode. Format: "provider-name:model-id".
  default: "anthropic:claude-sonnet-4-5-20250929"

  # ── Multi-tier mode (advanced) ──
  # When `tiers` is set, it OVERRIDES `default` for the listed tiers.
  # Setting `tiers.conversation` activates the router-first architecture:
  # a thin conversation LLM delegates work to task tiers (low/medium/high)
  # and verbalizes the results. Task tiers fall up: low -> medium -> high.
  #
  # tiers:
  #   conversation: "openai:gpt-4o-mini"
  #   high:         "anthropic:claude-opus-4-7"
  #   medium:       "anthropic:claude-sonnet-4-6"
  #   low:          "groq:llama-3.3-70b-versatile"

personality:
  core_traits:
    - "loyal"
    - "efficient"
    - "proactive"
    - "respectful"
    - "adaptive"

authority:
  # Default authority level (0-5)
  # 0: No permission (ask for everything)
  # 1: Read-only operations
  # 2: Safe modifications
  # 3: Standard operations (default)
  # 4: System changes
  # 5: Full control
  default_level: 3

# System cron triggers. Each fires `cron.<name>` on the shared event bus.
# Phase 2 will hook the goal system + commitment executor onto these so the
# 15-minute heartbeat poll can be removed. Defaults shown below.
# cron:
#   morning: "0 7 * * *"   # 7am local
#   evening: "0 20 * * *"  # 8pm local
#   hourly:  "37 * * * *"  # every hour at :37

# Text-to-Speech (voice output)
tts:
  enabled: false
  provider: "edge"            # "edge" (free) or "elevenlabs" (API key required)
  voice: "en-US-AriaNeural"  # Microsoft Edge TTS voice
  rate: "+0%"                 # Speaking rate: "-20%" (slow) to "+30%" (fast)
  volume: "+0%"               # Volume adjustment
  # ElevenLabs (uncomment to use)
  # elevenlabs:
  #   api_key: "sk_..."
  #   voice_id: ""             # Leave empty for default voice, or set a specific voice ID
  #   model: "eleven_flash_v2_5"  # "eleven_flash_v2_5" (fast) or "eleven_multilingual_v2" (quality)
  #   stability: 0.5
  #   similarity_boost: 0.75

# Speech-to-Text (voice input)
# stt:
#   provider: "openai"         # openai, groq, or local
#   openai:
#     api_key: "sk-..."

# Active role (must match a filename in roles/ without extension)
active_role: "personal-assistant"
